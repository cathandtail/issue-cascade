<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IssueCascade</title>
  <style>
    :root {
      --bg: var(--vscode-sideBar-background, #1e1e1e);
      --fg: var(--vscode-sideBar-foreground, #cccccc);
      --border: var(--vscode-panel-border, #3c3c3c);
      --hover: var(--vscode-list-hoverBackground, #2a2d2e);
      --accent: var(--vscode-focusBorder, #007fd4);
      --badge-bg: var(--vscode-badge-background, #4d4d4d);
      --badge-fg: var(--vscode-badge-foreground, #ffffff);
      --btn-bg: var(--vscode-button-background, #0e639c);
      --btn-fg: var(--vscode-button-foreground, #ffffff);
      --btn-hover: var(--vscode-button-hoverBackground, #1177bb);
      --secondary-btn-bg: var(--vscode-button-secondaryBackground, #3a3d41);
      --secondary-btn-fg: var(--vscode-button-secondaryForeground, #cccccc);
      --synced-color: #4caf50;
      --danger: var(--vscode-errorForeground, #f48771);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--vscode-font-family, sans-serif); font-size: 12px; color: var(--fg); background: var(--bg); display: flex; flex-direction: column; }

    /* ── Buttons ── */
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--fg); padding: 3px 5px; border-radius: 3px; font-size: 14px; line-height: 1; opacity: 0.7; }
    .icon-btn:hover { background: var(--hover); opacity: 1; }
    .primary-btn { background: var(--btn-bg); color: var(--btn-fg); border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .primary-btn:hover { background: var(--btn-hover); }
    .secondary-btn { background: var(--secondary-btn-bg); color: var(--secondary-btn-fg); border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .secondary-btn:hover { opacity: 0.85; }
    .danger-btn { background: none; border: none; cursor: pointer; color: var(--fg); padding: 3px 5px; border-radius: 3px; font-size: 14px; line-height: 1; opacity: 0.5; transition: opacity 0.1s, color 0.1s; }
    .danger-btn:hover { opacity: 1; color: var(--danger); background: var(--hover); }

    /* ── Layout ── */
    .main-scroll { flex: 1; overflow-y: auto; min-height: 0; }

    /* ── Section header ── */
    /* ── Issues header: repo / branch info ── */
    .hdr-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.75; }
    .hdr-repo { font-size: 11px; font-weight: 700; opacity: 0.9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; letter-spacing: 0; text-transform: none; }
    .hdr-branch-icon { width: 11px; height: 11px; flex-shrink: 0; opacity: 0.55; margin-left: 3px; }
    .hdr-branch { font-size: 10px; opacity: 0.6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; letter-spacing: 0; text-transform: none; font-weight: 400; }

    .section-hdr {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      opacity: 0.75;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
    }
    .section-hdr:hover { opacity: 1; }
    .section-arrow { font-size: 10px; transition: transform 0.15s; width: 12px; flex-shrink: 0; }
    .section-arrow.open { transform: rotate(90deg); }
    .section-title { flex: 1; }
    .section-body { display: none; }
    .section-body.open { display: block; }

    /* ── Mini Calendar ── */
    .mini-cal { padding: 4px 8px 6px; border-bottom: 1px solid var(--border); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 2px 0 4px; }
    .cal-title { font-size: 11px; font-weight: 600; opacity: 0.85; }
    .cal-nav { background: none; border: none; cursor: pointer; color: var(--fg); font-size: 15px; padding: 0 4px; line-height: 1; opacity: 0.55; }
    .cal-nav:hover { opacity: 1; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-dow { font-size: 9px; text-align: center; padding: 1px 0 3px; opacity: 0.4; }
    .cal-dow.sat { color: #7ab; }
    .cal-dow.sun { color: #f87; }
    .cal-day { font-size: 10px; text-align: center; height: 18px; line-height: 18px; border-radius: 3px; cursor: default; position: relative; }
    .cal-day.sat { color: #7ab; }
    .cal-day.sun { color: #f87; }
    .cal-day.has-tasks { cursor: pointer; font-weight: 700; color: var(--accent); }
    .cal-day.has-tasks:hover { background: var(--hover); }
    .cal-day.today { background: transparent !important; color: #fff !important; font-weight: 700; position: relative; }
    .cal-day.today::before {
      content: ''; position: absolute;
      top: 0; right: 0; bottom: 0; left: 0; margin: auto;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); z-index: -1;
    }
    .cal-day.expanded:not(.today) { text-decoration: underline; text-underline-offset: 2px; }

    /* ── Groups ── */
    .group { border-bottom: 1px solid var(--border); }
    .group-header { display: flex; align-items: center; padding: 6px 8px; gap: 4px; cursor: pointer; }
    .group-header:hover { background: var(--hover); }
    .group-arrow { font-size: 10px; transition: transform 0.15s; user-select: none; width: 12px; }
    .group-arrow.open { transform: rotate(90deg); }
    .group-name { flex: 1; font-weight: 600; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-repo { font-size: 10px; opacity: 0.6; margin-right: 4px; }
    .group-body { padding: 0; display: none; }
    .group-body.open { display: block; }
    .group-actions { display: flex; gap: 4px; padding: 4px 8px; border-top: 1px solid var(--border); align-items: center; }
    .send-btn { background: none; border: 1px solid var(--border); color: var(--fg); padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 4px; opacity: 0.8; transition: opacity 0.1s, border-color 0.1s; }
    .send-btn:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
    .send-btn svg { flex-shrink: 0; }

    /* ── Issue nodes ── */
    .issue-row { display: flex; align-items: center; padding: 3px 8px; gap: 3px; }
    .issue-row:hover { background: var(--hover); }
    .issue-arrow { font-size: 10px; transition: transform 0.15s; user-select: none; cursor: pointer; width: 14px; text-align: center; opacity: 0.6; flex-shrink: 0; }
    .issue-arrow.has-children { opacity: 1; }
    .issue-arrow.open { transform: rotate(90deg); }
    .issue-checkbox { flex-shrink: 0; cursor: pointer; width: 13px; height: 13px; accent-color: var(--accent); }
    .issue-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; font-size: 12px; }
    .issue-title:hover { text-decoration: underline; }
    .issue-title.closed { opacity: 0.5; text-decoration: line-through; }
    .issue-num { font-size: 10px; opacity: 0.5; flex-shrink: 0; }
    .issue-icon-btn { background: none; border: none; cursor: pointer; color: var(--fg); padding: 1px 3px; border-radius: 2px; font-size: 12px; opacity: 0.3; flex-shrink: 0; transition: opacity 0.1s; }
    .issue-row:hover .issue-icon-btn { opacity: 0.65; }
    .issue-icon-btn:hover { opacity: 1 !important; background: var(--hover); }
    .synced-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--synced-color); flex-shrink: 0; }
    .actionable-badge { font-size: 11px; flex-shrink: 0; opacity: 0.85; cursor: default; }
    .milestone-badge { font-size: 10px; flex-shrink: 0; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
    .children-container { display: none; }
    .children-container.open { display: block; }

    /* ── Task date list ── */
    .task-create-bar { padding: 6px 8px; }
    .task-create-btn { width: 100%; background: none; border: 1px dashed var(--border); color: var(--fg); padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; opacity: 0.7; text-align: center; }
    .task-create-btn:hover { border-color: var(--accent); opacity: 1; color: var(--accent); }

    .task-date-entry { border-bottom: 1px solid var(--border); }
    .task-date-row { display: flex; align-items: center; padding: 4px 8px; gap: 4px; cursor: pointer; user-select: none; }
    .task-date-row:hover { background: var(--hover); }
    .task-date-row.today { border-left: 2px solid var(--accent); }
    .task-date-arrow { font-size: 10px; transition: transform 0.15s; width: 12px; flex-shrink: 0; opacity: 0.6; }
    .task-date-arrow.open { transform: rotate(90deg); }
    .task-date-label { flex: 1; font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-date-count { font-size: 10px; opacity: 0.6; flex-shrink: 0; }
    .task-date-btn { background: none; border: none; cursor: pointer; color: var(--fg); padding: 1px 4px; border-radius: 2px; font-size: 12px; opacity: 0.3; flex-shrink: 0; transition: opacity 0.1s; }
    .task-date-row:hover .task-date-btn { opacity: 0.6; }
    .task-date-btn:hover { opacity: 1 !important; background: var(--hover); }
    .task-date-btn.danger:hover { color: var(--danger); }
    .task-date-btn.no-tasks { opacity: 0.2 !important; cursor: default; }
    .task-date-btn.no-tasks:hover { opacity: 0.2 !important; background: none !important; }

    /* ── Toast ── */
    #sidebar-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--vscode-notifications-background, #252526); color: var(--vscode-notifications-foreground, #cccccc); border: 1px solid var(--vscode-notifications-border, #454545); padding: 7px 14px; border-radius: 4px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 999; }
    #sidebar-toast.show { opacity: 1; }

    /* ── Task items (expanded) ── */
    .task-items { display: none; background: var(--hover); }
    .task-items.open { display: block; }
    .task-item-row { display: flex; align-items: center; padding: 3px 8px 3px 24px; gap: 6px; }
    .task-item-row:hover { background: var(--border); }
    .task-item-title { flex: 1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-item-title.done { opacity: 0.5; text-decoration: line-through; }
    .task-item-parent { font-size: 10px; opacity: 0.5; }
    .task-achievement { padding: 4px 8px 4px 24px; font-size: 11px; opacity: 0.7; }
    .achievement-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 3px; overflow: hidden; }
    .achievement-fill { height: 100%; background: var(--synced-color); border-radius: 2px; transition: width 0.3s; }

    .task-empty { padding: 10px 24px; font-size: 11px; opacity: 0.45; }

    /* ── Resizer ── */
    .resizer {
      flex-shrink: 0; height: 5px; cursor: ns-resize;
      background: var(--border);
      transition: background 0.15s;
      position: relative;
    }
    .resizer:hover, .resizer.active { background: var(--accent); }
    .resizer::after {
      content: ''; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 2px; border-radius: 1px;
      background: rgba(255,255,255,0.25);
      pointer-events: none;
    }

    /* ── Bottom panel (Tasks fixed area) ── */
    .bottom-panel { flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
    #sec-tasks-hdr { position: static; }
    #sec-tasks-body { display: none; }
    #sec-tasks-body.open { display: flex; flex-direction: column; flex: 1; overflow-y: auto; min-height: 0; }

    /* ── Register bar (sticky bottom) ── */
    .register-bar { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; background: var(--bg); }
    .register-bar-label { font-size: 11px; opacity: 0.7; padding: 0 4px; align-self: center; }

    /* ── Empty state ── */
    .empty { padding: 20px 12px; text-align: center; opacity: 0.5; font-size: 12px; line-height: 1.8; }

    /* ── depth colors ── */
    .depth-1 { color: var(--fg); }
    .depth-2 { opacity: 0.95; }
    .depth-3 { opacity: 0.9; }
    .depth-4 { opacity: 0.85; }
    .depth-5 { opacity: 0.8; }
    .depth-6 { opacity: 0.75; }
  </style>
</head>
<body>

  <!-- Issues スクロールエリア（全残高） -->
  <div class="main-scroll" id="main-scroll">
    <div class="section-hdr" id="sec-issues-hdr">
      <span class="section-arrow open" id="sec-issues-arrow"></span>
      <img src="{{ICON_URI}}" class="hdr-icon" />
      <span id="hdr-repo" class="hdr-repo">—</span>
      <svg class="hdr-branch-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0zm0 2.122a2.25 2.25 0 1 0-1.5 0v.878A2.25 2.25 0 0 0 5.75 8.5h1.5v2.128a2.251 2.251 0 1 0 1.5 0V8.5h1.5a2.25 2.25 0 0 0 2.25-2.25v-.878a2.25 2.25 0 1 0-1.5 0v.878a.75.75 0 0 1-.75.75h-4.5A.75.75 0 0 1 5 6.25v-.878zm3.75 7.378a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0zm3-8.75a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0z"/></svg>
      <span id="hdr-branch" class="hdr-branch">—</span>
      <span style="flex:1"></span>
      <button class="icon-btn" id="btn-show-today" title="Show Today's Tasks"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#666666"><path d="M222-200 80-342l56-56 85 85 170-170 56 57-226 226Zm0-320L80-662l56-56 85 85 170-170 56 57-226 226Zm298 320v-80h360v80H520Zm0-320v-80h360v80H520Z"/></svg></button>
      <button class="icon-btn" id="btn-reload" title=""><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#666666"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg></button>
      <button class="icon-btn" id="btn-new-group" title=""><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#666666"><path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z"/></svg></button>
      <button class="icon-btn" id="btn-import" title=""><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#666666"><path d="M440-800v487L216-537l-56 57 320 320 320-320-56-57-224 224v-487h-80Z"/></svg></button>
      <button class="icon-btn" id="btn-settings" title=".github ファイル設定"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#666666"><path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/></svg></button>
    </div>
    <div class="section-body open" id="sec-issues-body">
      <div class="empty" id="empty-state"></div>
      <div id="groups-container"></div>
    </div>
  </div>

  <!-- リサイザー -->
  <div class="resizer" id="resizer" title=""></div>

  <!-- Tasks 固定下部パネル -->
  <div class="bottom-panel" id="bottom-panel">
    <div class="section-hdr" id="sec-tasks-hdr">
      <span class="section-arrow open" id="sec-tasks-arrow"></span>
      <span class="section-title" id="bottom-header-label"></span>
    </div>
    <div class="section-body open" id="sec-tasks-body">
      <div class="mini-cal" id="mini-calendar-wrap">
        <div id="mini-calendar"></div>
      </div>
      <div id="task-list-container"></div>
    </div>
  </div>

  <!-- 登録バー（常時最下部） -->
  <div class="register-bar" id="register-bar" style="display:none">
    <span class="register-bar-label" id="register-label"></span>
    <button class="primary-btn" style="flex:1" id="btn-register-tasks"></button>
    <button class="secondary-btn" id="btn-clear-selection"></button>
  </div>

  <div id="sidebar-toast"></div>

  <script nonce="{{NONCE}}">
    const IC = {{LOCALE_JSON}};
    const vscode = acquireVsCodeApi();

    // ─── トースト ─────────────────────────────────────────────
    let _toastTimer;
    function showToast(msg) {
      const el = document.getElementById('sidebar-toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    let state = {
      groups: [],
      taskHistory: {},      // Record<string, TodayTask[]>
      checkedItems: new Map(),
      expandedDate: null,   // 展開中の日付
      weekRefDate: new Date().toISOString().split('T')[0],
      secIssuesOpen: true,
      secTasksOpen: true,
      expandedGroups: new Set(),  // 展開中グループID
      expandedIssues: new Set(),  // 子が展開中のIssue localId
    };
    let calYear  = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    // ─── ロケール初期化（静的要素） ──────────────────────────
    document.getElementById('empty-state').textContent          = IC.emptyGroups;
    document.getElementById('bottom-header-label').textContent  = IC.taskListHeader;
    document.getElementById('btn-register-tasks').textContent   = IC.registerTasks;
    document.getElementById('btn-clear-selection').textContent  = IC.clearSelection;
    document.getElementById('btn-reload').title                 = IC.btnReloadTip;
    //document.getElementById('btn-reload').textContent           = '↺';
    document.getElementById('btn-new-group').title              = IC.btnNewGroupTip;
    document.getElementById('btn-import').title                 = IC.btnImportTip;
    document.getElementById('resizer').title                    = IC.resizerTip;

    // ─── セクション折りたたみ ─────────────────────────────────
    function initSectionToggle(hdrId, arrowId, bodyId, stateKey) {
      const hdr   = document.getElementById(hdrId);
      const arrow = document.getElementById(arrowId);
      const body  = document.getElementById(bodyId);
      arrow.classList.toggle('open', state[stateKey]);
      body.classList.toggle('open', state[stateKey]);
      hdr.addEventListener('click', e => {
        if (e.target.closest('.icon-btn')) return;
        state[stateKey] = !state[stateKey];
        arrow.classList.toggle('open', state[stateKey]);
        body.classList.toggle('open',  state[stateKey]);
      });
    }
    initSectionToggle('sec-issues-hdr', 'sec-issues-arrow', 'sec-issues-body', 'secIssuesOpen');
    initSectionToggle('sec-tasks-hdr',  'sec-tasks-arrow',  'sec-tasks-body',  'secTasksOpen');

    // ─── メッセージ受信 ───────────────────────────────────────
    window.addEventListener('message', e => {
      const msg = e.data;
      if (msg.type === 'refresh') {
        state.groups      = msg.groups      || [];
        state.taskHistory = msg.taskHistory || {};
        if (msg.jumpToDate) {
          state.weekRefDate  = msg.jumpToDate;
          state.expandedDate = msg.jumpToDate;
        }
        if (msg.gitInfo) {
          document.getElementById('hdr-repo').textContent   = msg.gitInfo.repoName;
          document.getElementById('hdr-branch').textContent = msg.gitInfo.branch;
        }
        render();
      }
    });

    // ─── レンダリング ─────────────────────────────────────────
    function render() {
      renderGroups();
      renderTaskList();
    }

    function renderGroups() {
      const container = document.getElementById('groups-container');
      const empty     = document.getElementById('empty-state');
      empty.style.display = state.groups.length === 0 ? 'block' : 'none';
      container.innerHTML = '';
      state.groups.forEach(g => container.appendChild(renderGroup(g)));
    }

    function renderGroup(group) {
      const isGroupOpen = state.expandedGroups.has(group.id);
      const div = document.createElement('div');
      div.className = 'group';
      div.innerHTML = `
        <div class="group-header" data-group="${group.id}">
          <span class="group-arrow${isGroupOpen ? ' open' : ''}" data-group-arrow="${group.id}">▶</span>
          <span class="group-name" title="${esc(group.name)}">${esc(group.name)}</span>
          <span class="group-repo">${esc(group.repo)}</span>
          <button class="icon-btn" title="${esc(IC.groupAddIssueTip)}" data-action="new-issue" data-group="${group.id}"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#666666"><path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z"/></svg></button>
        </div>
        <div class="group-body${isGroupOpen ? ' open' : ''}" data-group-body="${group.id}">
          <div data-issues="${group.id}"></div>
          <div class="group-actions">
            <button class="send-btn" data-action="send" data-group="${group.id}" title="${esc(IC.groupSendToGitHub)}">

          </div>

      `;
      const issuesEl = div.querySelector(`[data-issues="${group.id}"]`);
      if (group.issues.length === 0) {
        issuesEl.innerHTML = `<div style="padding:8px 12px;opacity:0.5;font-size:11px">${esc(IC.issueEmpty)}</div>`;
      } else {
        group.issues.forEach(issue => issuesEl.appendChild(renderIssue(issue, group.id)));
      }
      div.querySelector(`[data-group="${group.id}"].group-header`).addEventListener('click', e => {
        if (e.target.closest('[data-action]')) return;
        const arrow = div.querySelector(`[data-group-arrow="${group.id}"]`);
        const body  = div.querySelector(`[data-group-body="${group.id}"]`);
        const open  = body.classList.toggle('open');
        arrow.classList.toggle('open', open);
        if (open) state.expandedGroups.add(group.id);
        else      state.expandedGroups.delete(group.id);
      });
      return div;
    }

    function renderIssue(issue, groupId, indentLevel = 0) {
      const frag = document.createDocumentFragment();
      const row  = document.createElement('div');
      row.className = `issue-row depth-${issue.depth}`;
      row.dataset.localId = issue.localId;

      const indent      = indentLevel * 16;
      const hasChildren = issue.children && issue.children.length > 0;
      const isIssueOpen = hasChildren && state.expandedIssues.has(issue.localId);
      const arrowClass  = `issue-arrow${hasChildren ? ' has-children' : ''}${isIssueOpen ? ' open' : ''}`;
      const titleClass  = `issue-title${issue.state === 'closed' ? ' closed' : ''}`;
      const numStr      = issue.githubNumber ? `#${issue.githubNumber}` : '';
      const syncDot         = issue.synced ? `<span class="synced-dot" title="${esc(IC.issueSyncedTip)}"></span>` : '';
      const actionableBadge = issue.isActionable ? `<span class="actionable-badge" title="${esc(IC.issueActionableTip)}">⚡</span>` : '';
      const milestoneBadge  = buildMilestoneBadge(issue);

      row.innerHTML = `
        <span style="width:${indent}px;flex-shrink:0"></span>
        <span class="${arrowClass}" data-toggle="${issue.localId}">${hasChildren ? '▶' : '　'}</span>
        <input type="checkbox" class="issue-checkbox" data-localid="${issue.localId}" data-groupid="${groupId}" title="${esc(IC.issueAddTaskTip)}">
        <span class="${titleClass}" data-view="${issue.localId}" data-groupid="${groupId}" title="${esc(issue.title)}">${esc(issue.title)}</span>
        <span class="issue-num">${numStr}</span>
        ${milestoneBadge}
        ${actionableBadge}
        ${syncDot}
        <button class="issue-icon-btn" title="${esc(IC.issueViewTip)}" data-action="view" data-localid="${issue.localId}" data-groupid="${groupId}">📋</button>
        <button class="issue-icon-btn" title="${esc(IC.issueEditTip)}" data-action="edit" data-localid="${issue.localId}" data-groupid="${groupId}"><svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="currentColor" style="vertical-align:middle"><path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/></svg></button>
        ${issue.depth < 6 ? `<button class="issue-icon-btn" title="${esc(IC.issueAddChildTip)}" data-action="add-child" data-localid="${issue.localId}" data-groupid="${groupId}"><svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="#666666"><path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z"/></svg></button>` : ''}
        ${issue.depth === 0 ? `<button class="issue-icon-btn" title="${esc(IC.groupSendToGitHub)}" data-action="send-root" data-localid="${issue.localId}" data-groupid="${groupId}" style="color:#4caf50"><svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="#666666"><path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/></svg>` : ''}
        ${issue.synced ? `<button class="issue-icon-btn" title="${esc(IC.issueSyncFromGitHubTip)}" data-action="sync-from-github" data-localid="${issue.localId}" data-groupid="${groupId}" style="color:#4caf50"><svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="currentColor" style="vertical-align:middle"><path d="M160-160v-80h110l-16-14q-52-46-73-105t-21-119q0-111 66.5-197.5T400-790v84q-72 26-116 88.5T240-478q0 45 17 87.5T307-316l13 12v-96h80v240H160Zm400-10v-84q72-26 116-88.5T720-482q0-45-17-87.5T653-644l-13-12v96h-80v-240h240v80H690l16 14q52 46 73 105t21 119q0 111-66.5 197.5T560-170Z"/></svg></button>` : ''}
        <button class="issue-icon-btn" title="${issue.state === 'closed' ? esc(IC.issueReopenTip) : esc(IC.issueCloseTip)}" data-action="toggle-state" data-localid="${issue.localId}" data-groupid="${groupId}" style="color:${issue.state === 'closed' ? '#888' : '#4caf50'}">${issue.state === 'closed' ? '<svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm-40-120 280-280-56-56-224 224-96-96-56 56 152 152Z"/></svg>'}</button>
        ${!issue.synced ? `<button class="issue-icon-btn" title="${esc(IC.issueDeleteTip)}" data-action="delete-issue" data-localid="${issue.localId}" data-groupid="${groupId}" style="color:var(--danger)"><svg xmlns="http://www.w3.org/2000/svg" height="14px" width="14px" viewBox="0 -960 960 960" fill="#e16b6b"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg></button>` : ''}
      `;
      frag.appendChild(row);

      if (hasChildren) {
        const childrenDiv = document.createElement('div');
        childrenDiv.className = `children-container${isIssueOpen ? ' open' : ''}`;
        issue.children.forEach(child => childrenDiv.appendChild(renderIssue(child, groupId, indentLevel + 1)));
        frag.appendChild(childrenDiv);
        row.querySelector(`[data-toggle="${issue.localId}"]`).addEventListener('click', () => {
          const open = childrenDiv.classList.toggle('open');
          row.querySelector(`[data-toggle="${issue.localId}"]`).classList.toggle('open', open);
          if (open) state.expandedIssues.add(issue.localId);
          else      state.expandedIssues.delete(issue.localId);
        });
      }
      return frag;
    }

    // ─── ミニカレンダー ───────────────────────────────────────
    function renderCalendar() {
      const wrap = document.getElementById('mini-calendar');
      if (!wrap) return;

      const today    = todayStr();
      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay  = new Date(calYear, calMonth + 1, 0);
      const startDow = firstDay.getDay();

      let html = `
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span class="cal-title">${IC.lang === 'ja' ? `${calYear}年 ${calMonth + 1}月` : `${calYear}-${String(calMonth+1).padStart(2,'0')}`}</span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid">
      `;

      IC.weekdays.forEach((d, i) => {
        const cls = i === 0 ? 'cal-dow sun' : i === 6 ? 'cal-dow sat' : 'cal-dow';
        html += `<div class="${cls}">${d}</div>`;
      });

      for (let i = 0; i < startDow; i++) {
        html += '<div class="cal-day"></div>';
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const mm      = String(calMonth + 1).padStart(2, '0');
        const dd      = String(d).padStart(2, '0');
        const dateStr = `${calYear}-${mm}-${dd}`;
        const dow     = (startDow + d - 1) % 7;
        const hasTasks   = dateStr in state.taskHistory;
        const isToday    = dateStr === today;
        const isExpanded = dateStr === state.expandedDate;

        let cls = 'cal-day';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (hasTasks)   cls += ' has-tasks';
        if (isToday)    cls += ' today';
        if (isExpanded) cls += ' expanded';

        html += `<div class="${cls}"${hasTasks ? ` data-cal-date="${dateStr}"` : ''}>${d}</div>`;
      }

      html += '</div>';
      wrap.innerHTML = html;

      document.getElementById('cal-prev').addEventListener('click', e => {
        e.stopPropagation();
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
      });
      document.getElementById('cal-next').addEventListener('click', e => {
        e.stopPropagation();
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
      });

      wrap.querySelectorAll('[data-cal-date]').forEach(el => {
        el.addEventListener('click', () => toggleDateExpand(el.dataset.calDate));
      });
    }

    // ─── 週範囲ユーティリティ（月曜始まり） ──────────────────
    function getWeekRange(dateStr) {
      const d   = new Date(dateStr + 'T12:00:00');
      const dow = d.getDay();
      const toMon = dow === 0 ? -6 : 1 - dow;
      const mon = new Date(d); mon.setDate(d.getDate() + toMon);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const fmt = dt => dt.toISOString().split('T')[0];
      return { start: fmt(mon), end: fmt(sun) };
    }

    // ─── タスクリスト ─────────────────────────────────────────
    function renderTaskList() {
      const container = document.getElementById('task-list-container');
      container.innerHTML = '';

      const today = todayStr();
      const hasTodayEntry = today in state.taskHistory;

      const { start, end } = getWeekRange(state.weekRefDate);
      const dates = Object.keys(state.taskHistory)
        .filter(d => d >= start && d <= end)
        .sort((a, b) => b.localeCompare(a));

      // 週ナビゲーションヘッダー
      const weekBar = document.createElement('div');
      weekBar.style.cssText = 'display:flex;align-items:center;gap:4px;padding:4px 8px 2px;font-size:11px;border-bottom:1px solid var(--border);';
      const isThisWeek = start <= today && today <= end;
      weekBar.innerHTML = `
        <button id="btn-week-prev" style="background:none;border:none;cursor:pointer;color:var(--fg);font-size:14px;padding:0 3px;opacity:0.55;line-height:1" title="">‹</button>
        <span style="flex:1;text-align:center;font-weight:600;opacity:0.8">${start} 〜 ${end.slice(5)}</span>
        <button id="btn-week-next" style="background:none;border:none;cursor:pointer;color:var(--fg);font-size:14px;padding:0 3px;opacity:${isThisWeek ? '0.25' : '0.55'};line-height:1" ${isThisWeek ? 'disabled' : ''}>›</button>
        ${!isThisWeek ? `<button id="btn-week-today" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10px;padding:0 4px;opacity:0.8">${esc(IC.weekThisWeek)}</button>` : ''}
      `;
      container.appendChild(weekBar);

      document.getElementById('btn-week-prev').addEventListener('click', () => {
        const d = new Date(start + 'T12:00:00');
        d.setDate(d.getDate() - 7);
        state.weekRefDate = d.toISOString().split('T')[0];
        calYear  = d.getFullYear();
        calMonth = d.getMonth();
        renderTaskList(); renderCalendar();
      });
      document.getElementById('btn-week-next')?.addEventListener('click', () => {
        const d = new Date(end + 'T12:00:00');
        d.setDate(d.getDate() + 1);
        state.weekRefDate = d.toISOString().split('T')[0];
        calYear  = d.getFullYear();
        calMonth = d.getMonth();
        renderTaskList(); renderCalendar();
      });
      document.getElementById('btn-week-today')?.addEventListener('click', () => {
        state.weekRefDate = today;
        calYear  = new Date().getFullYear();
        calMonth = new Date().getMonth();
        renderTaskList(); renderCalendar();
      });

      if (!hasTodayEntry && isThisWeek) {
        const bar = document.createElement('div');
        bar.className = 'task-create-bar';
        bar.innerHTML = `<button class="task-create-btn" id="btn-create-today">${IC.createTodayEntry}</button>`;
        container.appendChild(bar);
      }

      const todayTasks = state.taskHistory[today] || [];
      if (hasTodayEntry && isThisWeek && todayTasks.length === 0 && state.expandedDate === null) {
        state.expandedDate = today;
      }

      dates.forEach(date => {
        container.appendChild(renderDateEntry(date));
      });

      if (dates.length === 0) {
        const emp = document.createElement('div');
        emp.className = 'task-empty';
        emp.textContent = IC.weekEmpty;
        container.appendChild(emp);
      }

      document.getElementById('btn-create-today')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'createTodayEntry' });
      });

      renderCalendar();
    }

    function renderDateEntry(date) {
      const tasks     = state.taskHistory[date] || [];
      const done      = tasks.filter(t => t.completed).length;
      const total     = tasks.length;
      const rate      = total ? Math.round((done / total) * 100) : 0;
      const isToday   = date === todayStr();
      const isOpen    = state.expandedDate === date;
      const dayLabel  = formatDateWithDay(date);

      const entry = document.createElement('div');
      entry.className = 'task-date-entry';
      entry.dataset.dateEntry = date;

      const row = document.createElement('div');
      row.className = `task-date-row${isToday ? ' today' : ''}`;
      row.innerHTML = `
        <span class="task-date-arrow${isOpen ? ' open' : ''}" data-date-arrow="${date}">▶</span>
        <span class="task-date-label">${esc(dayLabel)}</span>
        <span class="task-date-count">${done}/${total}</span>
        <button class="task-date-btn${tasks.length === 0 ? ' no-tasks' : ''}" data-dup-date="${date}" title="${esc(IC.duplicateToTodayTip)}"><svg xmlns="http://www.w3.org/2000/svg" height="16px" width="16px" viewBox="0 -960 960 960" fill="currentColor"><path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/></svg></button>
        <button class="task-date-btn danger" data-del-date="${date}" title="${esc(IC.issueDeleteTip)}"><svg xmlns="http://www.w3.org/2000/svg" height="18px" width="18px" viewBox=" 0 -960 960 960" fill="#e16b6b"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg></button>
      `;
      entry.appendChild(row);

      const items = document.createElement('div');
      items.className = `task-items${isOpen ? ' open' : ''}`;
      items.dataset.dateItems = date;

      if (tasks.length === 0) {
        items.innerHTML = `
          <div class="task-empty" style="text-align:center;padding:12px 16px;line-height:2">
            <div style="font-size:18px;opacity:0.6">${IC.guideArrow}</div>
            <div>${IC.guideLine1}</div>
            <div>${IC.guideLine2}</div>
            <div style="margin-top:4px"><strong>${IC.guideAction}</strong></div>
          </div>`;
      } else {
        tasks.forEach(t => {
          const r = document.createElement('div');
          r.className = 'task-item-row';
          r.innerHTML = `
            <span style="flex-shrink:0;font-size:11px;width:14px">${t.completed ? '✅' : '☐'}</span>
            <div style="flex:1;min-width:0">
              <div class="task-item-title${t.completed ? ' done' : ''}">${esc(t.title)}</div>
              ${t.parentTitles?.length ? `<div class="task-item-parent">${esc(t.parentTitles.join(' › '))}</div>` : ''}
            </div>
          `;
          items.appendChild(r);
        });

        const otherHdr = document.createElement('div');
        otherHdr.className = 'other-work-header';
        otherHdr.textContent = IC.taskOtherWork;
        items.appendChild(otherHdr);

        const ach = document.createElement('div');
        ach.className = 'task-achievement';
        ach.innerHTML = `
          ${esc(IC.achievementLabel)} ${rate}% (${done}/${total})
          <div class="achievement-bar"><div class="achievement-fill" style="width:${rate}%"></div></div>
        `;
        items.appendChild(ach);
      }

      // タスクの有無に関わらず「詳細表示」ボタンは常に表示
      {
        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:4px;margin:4px 8px 6px 24px';

        const detailBtn = document.createElement('button');
        detailBtn.className = 'primary-btn task-report-btn';
        detailBtn.style.cssText = 'flex:1;font-size:11px;padding:3px 8px;margin:0';
        detailBtn.dataset.detailDate = date;
        detailBtn.textContent = IC.showDetail;
        btnRow.appendChild(detailBtn);

        items.appendChild(btnRow);
      }

      entry.appendChild(items);

      row.addEventListener('click', e => {
        if (e.target.closest('[data-edit-date]') || e.target.closest('[data-del-date]') || e.target.closest('[data-dup-date]')) return;
        toggleDateExpand(date);
      });

      return entry;
    }

    function toggleDateExpand(date) {
      state.expandedDate = state.expandedDate === date ? null : date;
      if (state.expandedDate) {
        state.weekRefDate = state.expandedDate;
        const d = new Date(state.expandedDate + 'T12:00:00');
        calYear  = d.getFullYear();
        calMonth = d.getMonth();
      }
      if (state.expandedDate && !state.secTasksOpen) {
        state.secTasksOpen = true;
        document.getElementById('sec-tasks-arrow').classList.add('open');
        document.getElementById('sec-tasks-body').classList.add('open');
      }
      renderTaskList();
      updateRegisterBar();
    }

    // ─── イベント委任（Issues セクション） ───────────────────
    document.getElementById('sec-issues-body').addEventListener('click', e => {
      const btn    = e.target.closest('[data-action]');
      if (!btn) return;
      const action  = btn.dataset.action;
      const groupId = btn.dataset.group;
      const localId = btn.dataset.localid;
      if (action === 'new-issue')    { vscode.postMessage({ type: 'newIssue', groupId }); }
      else if (action === 'send')    { vscode.postMessage({ type: 'sendToGitHub', groupId }); }
      else if (action === 'edit-tree')  { vscode.postMessage({ type: 'editGroupTree', groupId }); }
      else if (action === 'edit-group') { vscode.postMessage({ type: 'editGroup', groupId }); }
      else if (action === 'delete-group') {
        vscode.postMessage({ type: 'deleteGroup', groupId });
      }
      else if (action === 'view')      { vscode.postMessage({ type: 'viewIssue',  localId, groupId: btn.dataset.groupid }); }
      else if (action === 'edit')      { vscode.postMessage({ type: 'editIssue',  localId, groupId: btn.dataset.groupid }); }
      else if (action === 'add-child') { vscode.postMessage({ type: 'newIssue', groupId: btn.dataset.groupid, parentLocalId: localId }); }
      else if (action === 'send-root')        { vscode.postMessage({ type: 'sendRootToGitHub', localId, groupId: btn.dataset.groupid }); }
      else if (action === 'sync-from-github') { vscode.postMessage({ type: 'syncFromGitHub',    localId, groupId: btn.dataset.groupid }); }
      else if (action === 'toggle-state')     { vscode.postMessage({ type: 'toggleIssueState', localId, groupId: btn.dataset.groupid }); }
      else if (action === 'delete-issue') {
        vscode.postMessage({ type: 'deleteIssue', localId, groupId: btn.dataset.groupid });
      }
    });

    document.getElementById('sec-issues-body').addEventListener('click', e => {
      const span = e.target.closest('[data-view]');
      if (!span) return;
      vscode.postMessage({ type: 'viewIssue', localId: span.dataset.view, groupId: span.dataset.groupid });
    });

    document.getElementById('sec-issues-body').addEventListener('change', e => {
      const cb = e.target.closest('.issue-checkbox');
      if (!cb) return;
      if (cb.checked) { state.checkedItems.set(cb.dataset.localid, cb.dataset.groupid); }
      else            { state.checkedItems.delete(cb.dataset.localid); }
      updateRegisterBar();
    });

    // ─── イベント委任（Tasks セクション） ────────────────────
    document.getElementById('sec-tasks-body').addEventListener('click', e => {
      const editBtn = e.target.closest('[data-edit-date]');
      if (editBtn) { toggleDateExpand(editBtn.dataset.editDate); return; }

      const dupBtn = e.target.closest('[data-dup-date]');
      if (dupBtn) {
        const dupTasks = state.taskHistory[dupBtn.dataset.dupDate] || [];
        if (dupTasks.length === 0) { showToast(IC.duplicateNoTasksMsg); return; }
        vscode.postMessage({ type: 'duplicateTasks', date: dupBtn.dataset.dupDate });
        return;
      }

      const delBtn = e.target.closest('[data-del-date]');
      if (delBtn) {
        if (state.expandedDate === delBtn.dataset.delDate) { state.expandedDate = null; }
        vscode.postMessage({ type: 'deleteTaskEntry', date: delBtn.dataset.delDate });
        return;
      }

      const detailBtn = e.target.closest('[data-detail-date]');
      if (detailBtn) {
        vscode.postMessage({ type: 'showTaskDetail', date: detailBtn.dataset.detailDate });
        return;
      }

      const reportBtn = e.target.closest('[data-report-date]');
      if (reportBtn) {
        vscode.postMessage({ type: 'generateReport', date: reportBtn.dataset.reportDate });
        return;
      }
    });

    // ─── 登録バー ─────────────────────────────────────────────
    function updateRegisterBar() {
      const bar   = document.getElementById('register-bar');
      const label = document.getElementById('register-label');
      const hasChecked = state.checkedItems.size > 0;
      const targetDate = getRegisterTargetDate();
      const canRegister = hasChecked && targetDate !== null;

      bar.style.display = hasChecked ? 'flex' : 'none';
      if (hasChecked) {
        label.textContent = targetDate
          ? `→ ${formatDateWithDay(targetDate)}`
          : IC.registerDateHint;
        document.getElementById('btn-register-tasks').disabled = !canRegister;
      }
    }

    function getRegisterTargetDate() {
      if (state.expandedDate) { return state.expandedDate; }
      const today = todayStr();
      if (today in state.taskHistory) { return today; }
      return null;
    }

    document.getElementById('btn-register-tasks').addEventListener('click', () => {
      const date = getRegisterTargetDate();
      if (!date) return;
      const items = Array.from(state.checkedItems.entries()).map(([localId, groupId]) => ({ localId, groupId }));
      vscode.postMessage({ type: 'registerTodayTasks', items, date });
      state.checkedItems.clear();
      document.querySelectorAll('.issue-checkbox').forEach(cb => { cb.checked = false; });
      updateRegisterBar();
    });

    document.getElementById('btn-clear-selection').addEventListener('click', () => {
      state.checkedItems.clear();
      document.querySelectorAll('.issue-checkbox').forEach(cb => { cb.checked = false; });
      updateRegisterBar();
    });

    // ─── ヘッダーボタン ──────────────────────────────────────
    document.getElementById('btn-show-today').addEventListener('click', () => vscode.postMessage({ type: 'showTodaysTasks' }));
    document.getElementById('btn-reload').addEventListener('click', () => {
      const btn = document.getElementById('btn-reload');
      btn.style.transition = 'transform 0.4s';
      btn.style.transform  = 'rotate(360deg)';
      setTimeout(() => { btn.style.transition = ''; btn.style.transform = ''; }, 420);
      vscode.postMessage({ type: 'reload' });
    });
    document.getElementById('btn-new-group').addEventListener('click', () => vscode.postMessage({ type: 'newGroup' }));
    document.getElementById('btn-import').addEventListener('click',    () => vscode.postMessage({ type: 'showImportDialog' }));
    document.getElementById('btn-settings').addEventListener('click',  () => vscode.postMessage({ type: 'openSettings' }));

    // ─── マイルストーンバッジ ─────────────────────────────────
    function buildMilestoneBadge(issue) {
      if (!issue.endDate) { return ''; }

      const now = new Date(); now.setHours(0, 0, 0, 0);
      const end = new Date(issue.endDate + 'T12:00:00');
      const diffDays = Math.ceil((end - now) / 86400000);

      const mm = String(end.getMonth() + 1).padStart(2, '0');
      const dd = String(end.getDate()).padStart(2, '0');
      const label = `${mm}/${dd}`;

      let color = '';
      if (issue.state === 'closed') {
        color = '#4caf50';
      } else if (diffDays <= 2) {
        color = '#f48771';
      } else if (diffDays <= 7) {
        color = '#f5a623';
      }

      const style = color ? `color:${color};` : 'opacity:0.4;';
      return `<span class="milestone-badge" style="${style}" title="${esc(issue.endDate)}">${label}</span>`;
    }

    // ─── ユーティリティ ───────────────────────────────────────
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDateWithDay(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return `${dateStr} (${IC.weekdays[d.getDay()]})`;
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── パネルリサイズ ───────────────────────────────────────
    const INIT_PANEL_H = 402;
    const MIN_PANEL_H  = 32;
    const MAX_RATIO    = 0.80;

    const bottomPanel  = document.getElementById('bottom-panel');
    const resizer      = document.getElementById('resizer');

    function setPanelHeight(h) {
      const clamped = Math.max(MIN_PANEL_H, Math.min(h, window.innerHeight * MAX_RATIO));
      bottomPanel.style.height = clamped + 'px';
    }
    setPanelHeight(INIT_PANEL_H);

    let dragging = false, dragStartY = 0, dragStartH = 0;

    resizer.addEventListener('mousedown', e => {
      dragging    = true;
      dragStartY  = e.clientY;
      dragStartH  = bottomPanel.offsetHeight;
      resizer.classList.add('active');
      document.body.style.userSelect = 'none';
      document.body.style.cursor     = 'ns-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const delta = dragStartY - e.clientY;
      setPanelHeight(dragStartH + delta);
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('active');
      document.body.style.userSelect = '';
      document.body.style.cursor     = '';
    });

    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
